      { icon: '💬', label: '相談・文章作成', desc: '要約、下書き、壁打ち、翻訳、ファイル分析など。出力はコピペでOK', next: 'result-a' },
      { icon: '🖥️', label: 'AIにPCの作業をやらせたい', desc: 'ファイル整理、自動化、コードの生成・実行をAIに任せたい', next: 'q-auto' },
      { icon: '💻', label: '自分でコードを書く・編集する', desc: 'プログラミング、Web開発をAIのサポートを受けながら行いたい', next: 'q-editor' },
      { icon: '🤔', label: 'まだ決まっていない', desc: 'とりあえずAIを触ってみたい', next: 'result-a' }
    ]
  },
  {
    id: 'q-auto', number: 'Question 2 / 3',
    text: 'コマンドライン（黒い画面にテキストを打つ操作）に抵抗はありますか？',
    options: [
      { icon: '😊', label: '抵抗はない / 使ったことがある', desc: 'ターミナルやコマンドプロンプトを触ったことがある', next: 'result-c' },
      { icon: '🙂', label: 'よくわからないけど、やってみたい', desc: 'ガイド通りにやれば大丈夫そう', next: 'result-d' },
      { icon: '😰', label: '抵抗がある / GUIで操作したい', desc: '画面をクリックする操作の方がいい', next: 'result-d' }
    ]
  },
  {
    id: 'q-editor', number: 'Question 2 / 3',
    text: 'コードエディタを使ったことはありますか？',
    options: [
      { icon: '✅', label: 'VS Codeを使っている', desc: 'Visual Studio Codeをインストール済み', next: 'result-b-vscode' },
      { icon: '🔧', label: '他のエディタを使っている', desc: 'Sublime Text、Atom、サクラエディタなど', next: 'result-b-cursor' },
      { icon: '🆕', label: '使ったことがない', desc: 'コードエディタが何かよくわからない', next: 'result-b-cursor' }
    ]
  }
];

var resultMeta = {
  'result-a':        { type: 'type-a', emoji: '💬', title: 'Claude.ai（ブラウザ版）', subtitle: 'セットアップ不要 — 今すぐ始められます', tmpl: 'tmpl-result-a' },
  'result-d':        { type: 'type-d', emoji: '🖥️', title: 'Claude Codeデスクトップアプリ', subtitle: 'インストールするだけ — AIにPCを操作させよう', tmpl: 'tmpl-result-d' },
  'result-b-cursor': { type: 'type-b', emoji: '⚡', title: 'Cursor（AI内蔵エディタ）', subtitle: 'インストールするだけ — 15分で開始', tmpl: 'tmpl-result-b-cursor' },
  'result-b-vscode': { type: 'type-b', emoji: '🔧', title: 'VS Code + AI拡張', subtitle: '使い慣れた環境にAIを追加 — 15分で開始', tmpl: 'tmpl-result-b-vscode' },
  'result-c':        { type: 'type-c', emoji: '⚡', title: 'Claude Code CLI', subtitle: 'セットアップ30〜60分 — フル機能の自動化エージェント', tmpl: 'tmpl-result-c' }
};

var history = [];

function setProgress(pct) { document.getElementById('progress').style.width = pct + '%'; }

function renderIntro() {
  setProgress(0);
  var t = document.getElementById('tmpl-intro');
  document.getElementById('content').innerHTML = t.innerHTML;
}

function startQuiz() {
  history.push({ type: 'intro' });
  renderQuestion('q1');
}

function renderQuestion(qId) {
  var q = null;
  for (var i = 0; i < questions.length; i++) { if (questions[i].id === qId) { q = questions[i]; break; } }
  if (!q) return;
  setProgress(history.length / 4 * 100);

  var h = '<a class="back-link" onclick="goBack()">&#8592; 戻る</a>';
  h += '<div class="card"><div class="question-number">' + q.number + '</div>';
  h += '<div class="question-text">' + q.text + '</div><div class="options">';
  for (var i = 0; i < q.options.length; i++) {
    var o = q.options[i];
    h += '<button class="option-btn" onclick="selectOption(\'' + q.id + '\',' + i + ')">';
    h += '<span class="option-icon">' + o.icon + '</span>';
    h += '<div class="option-content"><strong>' + o.label + '</strong><span>' + o.desc + '</span></div>';
    h += '</button>';
  }
  h += '</div></div>';
  document.getElementById('content').innerHTML = h;
}

function renderResult(rid) {
  var r = resultMeta[rid];
  if (!r) return;
  setProgress(100);
  var body = document.getElementById(r.tmpl).innerHTML;
  var h = '<a class="back-link" onclick="goBack()">&#8592; 戻る</a>';
  h += '<div class="result-card"><div class="result-header ' + r.type + '">';
  h += '<div class="result-emoji">' + r.emoji + '</div>';
  h += '<div class="result-title">' + r.title + '</div>';
  h += '<div class="result-subtitle">' + r.subtitle + '</div></div>';
  h += '<div class="result-body">' + body + '</div></div>';
  h += '<div class="btn-group"><button class="btn btn-secondary" onclick="restart()">最初からやり直す</button></div>';
  document.getElementById('content').innerHTML = h;
}

function selectOption(qId, idx) {
  var q = null;
  for (var i = 0; i < questions.length; i++) { if (questions[i].id === qId) { q = questions[i]; break; } }
  var opt = q.options[idx];
  history.push({ type: 'question', id: qId });
  if (opt.next.indexOf('result-') === 0) { renderResult(opt.next); }
  else { renderQuestion(opt.next); }
}

function goBack() {
  if (history.length === 0) return;
  var prev = history.pop();
  if (prev.type === 'intro') { renderIntro(); }
  else { renderQuestion(prev.id); }
}

function restart() { history = []; renderIntro(); }

renderIntro();
</script>

</html>
